<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="homeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="10" y="10" width="100" height="100" rx="24" fill="url(#homeBg)"/>

  <!-- house -->
  <g filter="url(#shadow)">
    <path d="M30 55 L60 30 L90 55 V85 Q90 95 80 95 H40 Q30 95 30 85 Z" fill="url(#glass)"/>
  </g>

  <!-- door -->
  <rect x="52" y="65" width="16" height="25" rx="6" fill="white" opacity="0.9"/>
</svg>