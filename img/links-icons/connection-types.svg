<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="netBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>

    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dfe9f3"/>
    </linearGradient>

    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00c6ff" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="10" y="10" width="100" height="100" rx="24" fill="url(#netBg)"/>

  <!-- connections -->
  <g stroke="white" stroke-width="3" opacity="0.8">
    <line x1="40" y1="40" x2="80" y2="40"/>
    <line x1="40" y1="40" x2="60" y2="75"/>
    <line x1="80" y1="40" x2="60" y2="75"/>
  </g>

  <!-- nodes -->
  <g filter="url(#glow)">
    <circle cx="40" cy="40" r="6" fill="url(#node)"/>
    <circle cx="80" cy="40" r="6" fill="url(#node)"/>
    <circle cx="60" cy="75" r="6" fill="url(#node)"/>
  </g>
</svg>