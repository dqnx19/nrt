<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgTech" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="gearGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="10" y="10" width="100" height="100" rx="24" fill="url(#bgTech)"/>

  <!-- gear -->
  <g transform="translate(60,60)" filter="url(#softShadow)">
    <!-- outer teeth (rotated copies) -->
    <g fill="url(#gearGrad)">
      <rect x="-5" y="-38" width="10" height="14" rx="3"/>
      <rect x="-5" y="-38" width="10" height="14" rx="3" transform="rotate(45)"/>
      <rect x="-5" y="-38" width="10" height="14" rx="3" transform="rotate(90)"/>
      <rect x="-5" y="-38" width="10" height="14" rx="3" transform="rotate(135)"/>
      <rect x="-5" y="-38" width="10" height="14" rx="3" transform="rotate(180)"/>
      <rect x="-5" y="-38" width="10" height="14" rx="3" transform="rotate(225)"/>
      <rect x="-5" y="-38" width="10" height="14" rx="3" transform="rotate(270)"/>
      <rect x="-5" y="-38" width="10" height="14" rx="3" transform="rotate(315)"/>
    </g>

    <!-- main body -->
    <circle r="26" fill="url(#gearGrad)"/>

    <!-- inner cut-out -->
    <circle r="10" fill="#111827"/>
  </g>
</svg>